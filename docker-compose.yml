services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    image: local/mlops-api:latest
    container_name: mlops-api
    depends_on:
      - mlflow
    environment:
      MODEL_PATH: /app/models/model.joblib
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: mlops-prometheus
    depends_on:
      - api
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
    container_name: mlops-dcgm-exporter
    profiles:
      - gpu-monitoring
    ports:
      - "9400:9400"
    cap_add:
      - SYS_ADMIN

  grafana:
    image: grafana/grafana:11.5.2
    container_name: mlops-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro

  postgres:
    image: postgres:16
    container_name: mlflow-postgres
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: mlflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minio minio123 &&
      /usr/bin/mc mb -p local/mlflow || true &&
      /usr/bin/mc mb -p local/dvc || true &&
      exit 0
      "

  mlflow:
    build:
      context: .
      dockerfile: infra/docker/mlflow.Dockerfile
    image: local/mlflow-server:2.22.0
    container_name: mlflow-server
    depends_on:
      - postgres
      - minio
      - createbuckets
    environment:
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
      --artifacts-destination s3://mlflow/

volumes:
  postgres_data:
  minio_data:
  grafana_data:
