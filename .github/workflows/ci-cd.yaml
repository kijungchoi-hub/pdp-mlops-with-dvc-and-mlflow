name: ci-cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: mlops-api
  HELM_RELEASE_NAME: mlops-serving
  K8S_NAMESPACE: mlops

jobs:
  test-and-train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Reproduce pipeline
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
        run: dvc repro

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/

  build-test-and-push:
    if: github.event_name != 'pull_request'
    needs: test-and-train
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_repository: ${{ steps.meta.outputs.image_repository }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model
          path: models/

      - name: Set image metadata
        id: meta
        run: |
          echo "image_repository=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image for smoke test
        run: |
          docker build -f infra/docker/api.Dockerfile -t local/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Run smoke test container
        run: |
          docker run -d --rm --name mlops-api-smoke -p 8000:8000 local/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl --fail http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Smoke test predict endpoint
        run: |
          curl --fail -X POST http://127.0.0.1:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"sepal_length":5.1,"sepal_width":3.5,"petal_length":1.4,"petal_width":0.2}'

      - name: Show container logs on failure
        if: failure()
        run: docker logs mlops-api-smoke

      - name: Stop smoke test container
        if: always()
        run: docker stop mlops-api-smoke || true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image_repository }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate-helm:
    needs: test-and-train
    runs-on: ubuntu-latest
    strategy:
      matrix:
        values_file:
          - infra/helm/mlops-serving/values-dev.yaml
          - infra/helm/mlops-serving/values-staging.yaml
          - infra/helm/mlops-serving/values-prod.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Render Helm chart
        run: |
          helm template ${{ env.HELM_RELEASE_NAME }} ./infra/helm/mlops-serving \
            -n ${{ env.K8S_NAMESPACE }} \
            -f ${{ matrix.values_file }}

  deploy:
    if: github.event_name != 'pull_request'
    needs:
      - build-test-and-push
      - validate-helm
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set kubectl context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Apply namespace and base stack
        run: |
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/mlflow-stack.yaml

      - name: Validate production Helm render with image override
        run: |
          helm template ${{ env.HELM_RELEASE_NAME }} ./infra/helm/mlops-serving \
            -n ${{ env.K8S_NAMESPACE }} \
            -f ./infra/helm/mlops-serving/values-prod.yaml \
            --set image.repository=${{ needs.build-test-and-push.outputs.image_repository }} \
            --set image.tag=${{ needs.build-test-and-push.outputs.image_tag }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ./infra/helm/mlops-serving \
            -n ${{ env.K8S_NAMESPACE }} \
            --create-namespace \
            -f ./infra/helm/mlops-serving/values-prod.yaml \
            --set image.repository=${{ needs.build-test-and-push.outputs.image_repository }} \
            --set image.tag=${{ needs.build-test-and-push.outputs.image_tag }}

      - name: Wait for deployment rollout in deployment mode
        run: |
          if kubectl get deployment ${{ env.HELM_RELEASE_NAME }}-mlops-serving -n ${{ env.K8S_NAMESPACE }} >/dev/null 2>&1; then
            kubectl rollout status deployment/${{ env.HELM_RELEASE_NAME }}-mlops-serving -n ${{ env.K8S_NAMESPACE }} --timeout=180s
          else
            echo "No standard Deployment found. Skipping rollout wait."
          fi
