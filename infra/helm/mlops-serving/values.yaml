nameOverride: ""
fullnameOverride: ""

mode: deployment

image:
  repository: your-registry/mlops-api
  tag: latest
  pullPolicy: IfNotPresent

model:
  path: /app/models/model.joblib

service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 8000

deployment:
  replicaCount: 1
  containerPort: 8000
  env: []
  envFromSecret: ""
  readinessProbe:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    path: /live
    initialDelaySeconds: 15
    periodSeconds: 20

kserve:
  apiVersion: serving.kserve.io/v1beta1
  inferenceServiceName: iris-model

resources: {}

secret:
  create: false
  name: ""
  stringData: {}

persistence:
  enabled: false
  existingClaim: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  mountPath: /app/models

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mlops-api.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
