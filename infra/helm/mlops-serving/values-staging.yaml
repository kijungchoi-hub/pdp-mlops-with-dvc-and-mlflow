mode: deployment

image:
  repository: ghcr.io/your-org/mlops-api
  tag: staging
  pullPolicy: IfNotPresent

service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 8000

deployment:
  replicaCount: 2
  containerPort: 8000
  env: []
  envFromSecret: ""
  readinessProbe:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    path: /live
    initialDelaySeconds: 15
    periodSeconds: 20

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

secret:
  create: false
  name: ""
  stringData: {}

persistence:
  enabled: false
  existingClaim: ""
  accessModes:
    - ReadWriteOnce
  size: 2Gi
  mountPath: /app/models

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: staging-mlops-api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
