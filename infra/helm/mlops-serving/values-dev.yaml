mode: deployment

image:
  repository: ghcr.io/your-org/mlops-api
  tag: dev
  pullPolicy: IfNotPresent

service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 8000

deployment:
  replicaCount: 1
  containerPort: 8000
  env: []
  envFromSecret: ""
  readinessProbe:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    path: /live
    initialDelaySeconds: 15
    periodSeconds: 20

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

secret:
  create: false
  name: ""
  stringData: {}

persistence:
  enabled: false
  existingClaim: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  mountPath: /app/models

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: dev-mlops-api.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
