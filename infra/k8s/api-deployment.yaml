apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-api
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlops-api
  template:
    metadata:
      labels:
        app: mlops-api
    spec:
      containers:
        - name: mlops-api
          image: your-registry/mlops-api:latest
          env:
            - name: MODEL_PATH
              value: /app/models/model.joblib
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: mlops-api
  namespace: mlops
spec:
  selector:
    app: mlops-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
