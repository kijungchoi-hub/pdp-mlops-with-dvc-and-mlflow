apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlops-platform-root
  namespace: argocd
spec:
  project: mlops-platform
  source:
    repoURL: https://github.com/REPLACE_WITH_OWNER/REPLACE_WITH_REPO.git
    targetRevision: main
    path: infra/argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
