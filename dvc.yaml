stages:
  prepare:
    cmd: .venv\Scripts\python.exe -m src.prepare
    deps:
      - src/prepare.py
    outs:
      - data/processed/train.csv
      - data/processed/test.csv
  train:
    cmd: .venv\Scripts\python.exe -m src.train
    deps:
      - src/train.py
      - data/processed/train.csv
      - params.yaml
    params:
      - train.random_state
      - train.max_depth
      - train.test_size
    outs:
      - models/model.joblib
    metrics:
      - reports/metrics.json
  evaluate:
    cmd: .venv\Scripts\python.exe -m src.evaluate
    deps:
      - src/evaluate.py
      - models/model.joblib
      - data/processed/test.csv
    metrics:
      - reports/eval.json
