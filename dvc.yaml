stages:
  prepare:
    cmd: python -m src.pipelines.prepare
    deps:
      - src/pipelines/prepare.py
      - src/common/utils.py
      - configs/params.yaml
    outs:
      - data/processed/train.csv
      - data/processed/test.csv
  train:
    cmd: python -m src.pipelines.train
    deps:
      - src/pipelines/train.py
      - src/common/utils.py
      - data/processed/train.csv
      - configs/params.yaml
    params:
      - configs/params.yaml:
          - train.random_state
          - train.max_depth
          - train.test_size
    outs:
      - models/model.joblib
    metrics:
      - reports/metrics.json
  evaluate:
    cmd: python -m src.pipelines.evaluate
    deps:
      - src/pipelines/evaluate.py
      - src/common/utils.py
      - models/model.joblib
      - data/processed/test.csv
    metrics:
      - reports/eval.json
